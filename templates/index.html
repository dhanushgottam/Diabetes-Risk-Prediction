<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diabetes Risk Predictor</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    padding-top:80px;
}

/* HEADER */
.header{
    position:fixed;
    top:0;width:100%;
    background:linear-gradient(45deg,#667eea,#764ba2);
    padding:15px;
}
.header h1{color:white}

/* CONTAINER */
.container{
    width:90%;
    margin:auto;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    border-radius:20px;
    padding:30px;
}

/* GRID */
.form-grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:20px;
}

.input-grid{
    background:rgba(255,255,255,0.15);
    padding:15px;
    border-radius:10px;
    transition:.3s;
}

.input-grid.error{
    border:2px solid red;
    animation:shake .3s;
}

@keyframes shake{
    0%{transform:0}
    25%{transform:translateX(-5px)}
    75%{transform:translateX(5px)}
}

/* INPUT */
input,select{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:none;
}
.input-grid.error {
    border: 2px solid #ff4757 !important;
    animation: shake 0.3s;
}
/* BUTTONS */
.yes-no-buttons{display:flex;gap:10px;}

.yes-no-btn{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    opacity:.5;
    transition:.2s;
}

.yes-btn{background:#4ecdc4;color:white;}
.no-btn{background:#ff6b6b;color:white;}

.yes-no-btn:hover{transform:scale(1.05);}

.yes-no-btn.selected{
    opacity:1;
    transform:scale(1.1);
    box-shadow:0 0 10px white;
}

/* SUBMIT */
.submit-btn{
    margin-top:20px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#ff6b6b;
    color:white;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<header class="header">
<h1>Diabetes Predictor</h1>
</header>

<div class="container">

<form action="/predict" method="POST" id="predictForm" onsubmit="return validateForm()">

<div class="form-grid">

<!-- BMI -->
<div class="input-grid">
<h3>BMI</h3>
<input type="number" name="BMI" required>
</div>

<!-- HighBP -->
<div class="input-grid">
<h3>High BP</h3>
<input type="hidden" name="HighBP" value="" id="HighBP">
<div class="yes-no-buttons">
<button type="button" class="yes-no-btn yes-btn" onclick="toggleBtn('HighBP',1,this)">Yes</button>
<button type="button" class="yes-no-btn no-btn" onclick="toggleBtn('HighBP',0,this)">No</button>
</div>
</div>

<!-- HighChol -->
<div class="input-grid">
<h3>High Cholesterol</h3>
<input type="hidden" name="HighChol" value="" id="HighChol" >
<div class="yes-no-buttons">
<button type="button" class="yes-no-btn yes-btn" onclick="toggleBtn('HighChol',1,this)">Yes</button>
<button type="button" class="yes-no-btn no-btn" onclick="toggleBtn('HighChol',0,this)">No</button>
</div>
</div>

<!-- Alcohol -->
<div class="input-grid">
<h3>Alcohol</h3>
<input type="hidden" name="HvyAlcoholConsump" value="" id="HvyAlcoholConsump">
<div class="yes-no-buttons">
<button type="button" class="yes-no-btn yes-btn" onclick="toggleBtn('HvyAlcoholConsump',1,this)">Yes</button>
<button type="button" class="yes-no-btn no-btn" onclick="toggleBtn('HvyAlcoholConsump',0,this)">No</button>
</div>
</div>

<!-- Gen Health -->
<div class="input-grid">
<h3>General Health</h3>
<select name="GenHlth" required>
<option value="">Select</option>
<option value="1">Excellent</option>
<option value="2">Very Good</option>
<option value="3">Good</option>
<option value="4">Fair</option>
<option value="5">Poor</option>
</select>
</div>

<!-- Age -->
<div class="input-grid">
<h3>Age</h3>
<select name="Age" required>
<option value="">Select</option>
<option value="1">18–24</option>
<option value="2">25–29</option>
<option value="3">30–34</option>
<option value="4">35–39</option>
<option value="5">40–44</option>
<option value="6">45–49</option>
<option value="7">50–54</option>
<option value="8">55–59</option>
<option value="9">60–64</option>
<option value="10">65–69</option>
<option value="11">70–74</option>
<option value="12">75–79</option>
<option value="13">80+</option>
</select>
</div>

<!-- Heart -->
<div class="input-grid">
<h3>Heart Disease</h3>
<input type="hidden" name="HeartDiseaseorAttack" value="" id="HeartDiseaseorAttack">
<div class="yes-no-buttons">
<button type="button" class="yes-no-btn yes-btn" onclick="toggleBtn('HeartDiseaseorAttack',1,this)">Yes</button>
<button type="button" class="yes-no-btn no-btn" onclick="toggleBtn('HeartDiseaseorAttack',0,this)">No</button>
</div>
</div>

<!-- Walk -->
<div class="input-grid">
<h3>Difficulty Walking</h3>
<input type="hidden" name="DiffWalk" value="" id="DiffWalk" >
<div class="yes-no-buttons">
<button type="button" class="yes-no-btn yes-btn" onclick="toggleBtn('DiffWalk',1,this)">Yes</button>
<button type="button" class="yes-no-btn no-btn" onclick="toggleBtn('DiffWalk',0,this)">No</button>
</div>
</div>

<!-- Activity -->
<div class="input-grid">
<h3>Physical Activity</h3>
<input type="hidden" name="PhysActivity" value="" id="PhysActivity">
<div class="yes-no-buttons">
<button type="button" class="yes-no-btn yes-btn" onclick="toggleBtn('PhysActivity',1,this)">Yes</button>
<button type="button" class="yes-no-btn no-btn" onclick="toggleBtn('PhysActivity',0,this)">No</button>
</div>
</div>

<!-- Smoker -->
<div class="input-grid">
<h3>Smoker</h3>
<input type="hidden" name="Smoker" value="" id="Smoker">
<div class="yes-no-buttons">
<button type="button" class="yes-no-btn yes-btn" onclick="toggleBtn('Smoker',1,this)">Yes</button>
<button type="button" class="yes-no-btn no-btn " onclick="toggleBtn('Smoker',0,this)">No</button>
</div>
</div>

</div>

<button class="submit-btn">Predict</button>

</form>
</div>

<script>

/* =========================
   YES / NO BUTTON
========================= */
function toggleBtn(fieldName, value, clickedBtn) {
    const input = document.getElementById(fieldName);
    input.value = value;

    clickedBtn.parentElement.querySelectorAll('.yes-no-btn')
        .forEach(btn => btn.classList.remove('selected'));

    clickedBtn.classList.add('selected');
}


/* =========================
   STEP VALIDATION (ONE BOX AT A TIME)
========================= */
function validateForm(){

    const grids = document.querySelectorAll('.input-grid');

    for(let grid of grids){

        grid.classList.remove('error');

        let numberInput = grid.querySelector('input[type="number"]');
        let select = grid.querySelector('select');
        let hidden = grid.querySelector('input[type="hidden"]');

        // ❌ BMI missing
        if(numberInput && numberInput.value.trim() === ""){
            showError(grid);
            return false;
        }

        // ❌ Dropdown missing
        if(select && select.value === ""){
            showError(grid);
            return false;
        }

        // ❌ Yes/No missing
        if(hidden && hidden.value === ""){
            showError(grid);
            return false;
        }
    }

    return true;
}


/* =========================
   ERROR UI
========================= */
function showError(grid){
    grid.classList.add('error');

    // scroll to that box
    grid.scrollIntoView({
        behavior: "smooth",
        block: "center"
    });
}


/* =========================
   SUBMIT CONTROL
========================= */
document.getElementById('predictForm').addEventListener('submit', function(e){

    if(!validateForm()){
        e.preventDefault();
        return false;
    }

});
</script>

</body>
</html>
